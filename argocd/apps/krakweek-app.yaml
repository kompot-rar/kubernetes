apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: krakweek
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/kompot-rar/kubernetes.git
    targetRevision: HEAD
    path: manifests/krakweek
  destination:
    server: https://kubernetes.default.svc
    namespace: krakweek
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 5m
