# krakweek backend HTTP service.
# - 2 replicas baseline, HPA scales 2..6 on 70% CPU.
# - Port 8080 — matches Android emulator's BASE_URL=http://10.0.2.2:8080
#   for local dev, and the Traefik Ingress routes external traffic here
#   in production (see ingress.yaml).
# - /healthz endpoint (defined in backend/internal/handler/health.go) is
#   used for both liveness and readiness — healthz returns 200 only when
#   the DB connection is alive, so a single probe is sufficient.
# - krakweek.deploy/revision annotation on pod template forces a redeploy
#   when changed (kubectl rollout restart would also work, but annotation
#   changes are picked up by ArgoCD on next sync).
# - imagePullSecrets: ghcr-secret — Kuźnia (10.0.20.50:5000) is the
#   primary mirror; ghcr.io is the public fallback. The secret must
#   exist in the krakweek namespace; see README for setup.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: krakweek
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: krakweek
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/component: api
      annotations:
        krakweek.deploy/revision: "2026-06-16-mvp1-initial"
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: backend
          image: 10.0.20.50:5000/krakweek-backend:dev
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: krakweek-secrets
                  key: DATABASE_URL
            - name: PORT
              value: "8080"
            - name: GIN_MODE
              value: release
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: krakweek
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: krakweek
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: krakweek
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: krakweek
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
