apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Pin everything in this kustomization to the krakweek namespace. This is
# safer than relying on every individual manifest having namespace: krakweek
# set correctly — if one forgets, Kustomize still pins it.
namespace: krakweek

resources:
  - namespace.yaml
  - postgres-db.yaml
  - migration-job.yaml
  - backend.yaml
  - ingress.yaml
  # secrets.example.yaml is intentionally NOT included — secrets are created
  # out-of-band by the operator so they never enter git history. See
  # secrets.example.yaml header for the kubectl command.

# Common labels applied to every resource ArgoCD tracks. Helps
# `kubectl get all -l app.kubernetes.io/part-of=krakweek -n krakweek`
# return a clean per-app view.
labels:
  - includeSelectors: true
    pairs:
      app.kubernetes.io/part-of: krakweek
      app.kubernetes.io/managed-by: argocd
