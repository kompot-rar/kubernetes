# ClusterIP — exposed externally via Cloudflare Tunnel, not Ingress.
# Tunnel target: http://fishky-front.fishky-front.svc.cluster.local:80
apiVersion: v1
kind: Service
metadata:
  name: fishky-front
  namespace: fishky-front
spec:
  selector:
    app: fishky-front
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: ClusterIP
