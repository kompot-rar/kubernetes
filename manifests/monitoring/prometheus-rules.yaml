apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: sla-tracking
  namespace: monitoring
  labels:
    release: monitoring
spec:
  groups:
  - name: sla_tracking
    interval: 1m
    rules:
      # POMOCNICZA: Filtruje mrugnięcia sieci (wymaga minimum 2 błędów z rzędu aby raportować 0)
      - record: sla:probe_success_filtered
        expr: max_over_time(probe_success{job="blackbox", instance="https://devops.mrozy.org"}[1m])

      # DZIENNE SLA: Liczone z odszumionych danych (zapisuje jeden punkt na dzień w bazie)
      - record: sla:availability:daily
        expr: avg_over_time(sla:probe_success_filtered[1d])

      # 30-DNIOWE SLA: Liczone z odszumionych DZIENNYCH statystyk (lekkie i odporne na retencję logów)
      - record: sla:availability:30d
        expr: avg_over_time(sla:availability:daily[30d])

      # Czas odpowiedzi P95 z 30 dni (sekundy)
      - record: sla:response_time:p95:30d
        expr: quantile_over_time(0.95, probe_duration_seconds{job="blackbox", instance="https://devops.mrozy.org"}[30d])

      # Średni dzienny czas odpowiedzi (sekundy)
      - record: sla:response_time:avg:daily
        expr: avg_over_time(probe_duration_seconds{job="blackbox", instance="https://devops.mrozy.org"}[1d])

      # Suma minut realnego downtimeu w ostatnich 30 dniach (błędy trwające > 1 min)
      - record: sla:downtime:minutes:30d
        expr: sum_over_time((1 - sla:probe_success_filtered)[30d:1m])
