apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fishky-ingress
  namespace: fishky
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - api.fishky.app
      secretName: fishky-tls
  rules:
    - host: api.fishky.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8000
