apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: fishky
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
      annotations:
        # Bump this on every new :latest push so ArgoCD sees a manifest diff
        # and rolls the pods (otherwise an unchanged :latest tag never
        # redeploys).  Value is just a marker — date + short reason.
        fishky.deploy/revision: "2026-05-30-tts-deck-audio"
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: backend
          image: ghcr.io/kompot-rar/fishky-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fishky-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: fishky-secrets
                  key: REDIS_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: fishky-secrets
                  key: JWT_SECRET
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: fishky-secrets
                  key: GEMINI_API_KEY
            # --- Google Play Billing ---
            # Path to the service-account JSON mounted from `fishky-play-sa` secret.
            # The file itself is delivered by the volumeMount below — this env var
            # just tells play_billing_service._get_service() where to find it.
            - name: GOOGLE_PLAY_SERVICE_ACCOUNT_FILE
              value: "/secrets/play-sa.json"
            # Required by Google libraries (including Firebase SDK).
            # Currently points to the same key as billing, but in the future
            # it could be a dedicated file like /secrets/firebase-adminsdk.json from Firebase Console.
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/secrets/play-sa.json"
            # Package name = Android applicationId from frontend/android/app/build.gradle
            # (NOT the Kotlin namespace "com.fishky.fishky" — that's unrelated).
            - name: GOOGLE_PLAY_PACKAGE_NAME
              value: "fishky.mrozy"
            # Must equal the full URL configured as the Pub/Sub push endpoint.
            # Google signs every RTDN push JWT with this string as audience;
            # mismatch = 401 in _verify_rtdn_request.
            - name: RTDN_PUSH_AUDIENCE
              value: "https://apifishky.mrozy.org/api/billing/rtdn"
            # Email of the service account that Pub/Sub uses to sign push JWTs.
            # Stored in secret (not value:) so rotation doesn't require a repo edit.
            - name: RTDN_PUSH_SERVICE_ACCOUNT
              valueFrom:
                secretKeyRef:
                  name: fishky-secrets
                  key: RTDN_PUSH_SERVICE_ACCOUNT
            # MUST be "false" in production — startup check in app/main.py will
            # RuntimeError if any of the three vars above are empty while this is false.
            - name: DISABLE_PLAY_VERIFICATION
              value: "false"
            - name: FIREBASE_ADMIN_CREDENTIALS
              value: /firebase-secrets/firebase-sa.json
          volumeMounts:
            - name: play-sa
              mountPath: /secrets
              readOnly: true
            - name: firebase-sa
              mountPath: /firebase-secrets
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        # Mounted at /secrets/play-sa.json inside the container.
        # Secret must be created out-of-band (NOT in ArgoCD):
        #   kubectl create secret generic fishky-play-sa -n fishky \
        #     --from-file=play-sa.json=./fishky-play-sa.json
        - name: play-sa
          secret:
            secretName: fishky-play-sa
        - name: firebase-sa
          secret:
            secretName: firebase-admin-sa
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: fishky
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: backend-hpa
  namespace: fishky
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: backend
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
