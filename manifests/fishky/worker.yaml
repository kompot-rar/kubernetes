apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: fishky
spec:
  replicas: 0
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: worker
          image: ghcr.io/kompot-rar/fishky-backend:latest
          command: ["python", "-m", "app.worker"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fishky-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: fishky-secrets
                  key: REDIS_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: fishky-secrets
                  key: JWT_SECRET
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: fishky-secrets
                  key: GEMINI_API_KEY
            # Play Billing — parity with backend.yaml.  Worker is `replicas: 0`
            # today (legacy RQ flow unused) but we include these so any future
            # revival doesn't require a second K8s PR.  See backend.yaml for
            # rationale on each variable.
            - name: GOOGLE_PLAY_SERVICE_ACCOUNT_FILE
              value: "/secrets/play-sa.json"
            - name: GOOGLE_PLAY_PACKAGE_NAME
              value: "fishky.mrozy"
            - name: RTDN_PUSH_AUDIENCE
              value: "https://apifishky.mrozy.org/api/billing/rtdn"
            - name: RTDN_PUSH_SERVICE_ACCOUNT
              valueFrom:
                secretKeyRef:
                  name: fishky-secrets
                  key: RTDN_PUSH_SERVICE_ACCOUNT
            - name: DISABLE_PLAY_VERIFICATION
              value: "false"
          volumeMounts:
            - name: play-sa
              mountPath: /secrets
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: play-sa
          secret:
            secretName: fishky-play-sa
